name: Stash
options:
  deploymentTarget:
    macOS: "12.0"
  bundleIdPrefix: com.stash
  generateEmptyDirectories: true

targets:
  Stash:
    type: application
    platform: macOS
    sources: [Stash]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stash.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.6"
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Stash/Info.plist

  StashTests:
    type: bundle.unit-test
    platform: macOS
    sources: [StashTests]
    dependencies:
      - target: Stash
    settings:
      base:
        SWIFT_VERSION: "5.6"
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        GENERATE_INFOPLIST_FILE: true

  StashUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [StashUITests]
    dependencies:
      - target: Stash
    settings:
      base:
        SWIFT_VERSION: "5.6"
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        GENERATE_INFOPLIST_FILE: true
