name: Stash
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.stash
  generateEmptyDirectories: true

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    exact: "0.2.1"

targets:
  Stash:
    type: application
    platform: macOS
    sources: [Stash]
    dependencies:
      - package: HotKey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stash.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.6"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Stash/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Stash/Stash-Bridging-Header.h

  StashTests:
    type: bundle.unit-test
    platform: macOS
    sources: [StashTests]
    dependencies:
      - target: Stash
    settings:
      base:
        SWIFT_VERSION: "5.6"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true

  StashUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [StashUITests]
    dependencies:
      - target: Stash
    settings:
      base:
        SWIFT_VERSION: "5.6"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
